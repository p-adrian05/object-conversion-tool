<template>
    <lightning-textarea
            id="descriptionInput"
            placeholder="Enter description"
            max-length="255"
            value={mappingTemplateDescription}
            onchange={handleMappingTemplateDescriptionChange}
    >
    </lightning-textarea>
    <lightning-layout multiple-rows="true" horizontal-align="end" class="">
        <lightning-layout-item flexibility="grow" class="slds-m-top_medium slds-m-right_medium">
            <lightning-combobox name="sourceObjects"
                                label="Convert From"
                                disabled={objectMappingTemplateId}
                                value={selectedSourceObjectApiName}
                                placeholder="Select Object"
                                options={sourceObjectOptions}
                                onchange={handleSourceObjectChange}
                                ></lightning-combobox>
        </lightning-layout-item>
        <lightning-layout-item flexibility="auto" class="slds-p-around_medium slds-m-top_large"><lightning-icon icon-name="standard:macros" alternative-text="No data found" title="No data found" ></lightning-icon></lightning-layout-item>
        <lightning-layout-item flexibility="grow" class="slds-m-top_medium  slds-m-left_medium">
            <lightning-combobox name="targetObjects"
                                label="Convert To"
                                disabled={objectMappingTemplateId}
                                value={selectedTargetObjectApiName}
                                placeholder="Select Object"
                                options={targetObjectOptions}
                                onchange={handleTargetObjectChange}
            ></lightning-combobox>
        </lightning-layout-item>
    </lightning-layout>
    <template if:true={showFieldMappings}>
        <c-object-field-mappings source-object-api-name= {selectedSourceObjectApiName}
                                 target-object-api-name= {selectedTargetObjectApiName}
                                 field-mapping-data-list={fieldMappingDataList}
                                 init-required-fields={initRequiredFields}
        ></c-object-field-mappings>
    </template>
</template>
